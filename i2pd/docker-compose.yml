services:
  i2pd:
    image: purplei2p/i2pd
    container_name: i2pd
    volumes:
      - i2pd_config:/var/lib/i2pd
      - ./i2pd.conf:/etc/i2pd/i2pd.conf:ro
    ports:
      - "7656:7656"
    networks:
      - i2p_network
    restart: unless-stopped

networks:
  i2p_network:
    external: true

volumes:
  i2pd_config:
